# MLflow tracking server configuration
# If your MLflow version supports config files:
#   mlflow server --config mlflow/server_config.yaml
# Otherwise run the equivalent explicit command:
#   python3 -m mlflow server --backend-store-uri sqlite:///mlruns/mlflow.db --default-artifact-root mlruns/artifacts --host 0.0.0.0 --port 5000

backend_store_uri: "sqlite:///mlruns/mlflow.db"
default_artifact_root: "mlruns/artifacts"
host: "0.0.0.0"
port: 5000
