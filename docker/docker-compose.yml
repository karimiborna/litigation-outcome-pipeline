version: "3.9"

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  feature-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.features
    ports:
      - "8001:8001"
    env_file:
      - ../.env
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - NVIDIA_BUILD_API_KEY=${NVIDIA_BUILD_API_KEY}
      - LLM_API_KEY=${LLM_API_KEY}
    depends_on:
      mlflow:
        condition: service_healthy

  inference-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.inference
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      mlflow:
        condition: service_healthy
      feature-service:
        condition: service_started
    volumes:
      - retrieval-index:/app/data/retrieval_index

volumes:
  mlflow-data:
  retrieval-index:
