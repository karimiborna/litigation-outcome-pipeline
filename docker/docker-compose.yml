version: "3.9"

services:
  feature-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.features
    ports:
      - "8001:8001"
    env_file:
      - ../.env
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - NVIDIA_BUILD_API_KEY=${NVIDIA_BUILD_API_KEY}
      - LLM_API_KEY=${LLM_API_KEY}
      - MLFLOW_TRACKING_URI=http://35.208.251.175:5000

  inference-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.inference
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - MLFLOW_TRACKING_URI=http://35.208.251.175:5000
    depends_on:
      - feature-service
    volumes:
      - retrieval-index:/app/data/retrieval_index

volumes:
  retrieval-index:
